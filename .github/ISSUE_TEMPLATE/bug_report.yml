name: Bug report
description: Report a defect in Binderbase
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill out the fields below so
        we can reproduce and fix it quickly. **Do not include personal data, API keys,
        or full collection dumps.**
  - type: input
    id: version
    attributes:
      label: Binderbase version
      description: Shown in the footer of the app (e.g. `v0.1.0`).
      placeholder: v0.1.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 10
        - Windows 11
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Linux
        - Other (describe below)
    validations:
      required: true
  - type: dropdown
    id: game
    attributes:
      label: Game (if relevant)
      options:
        - Not applicable
        - Magic: The Gathering
        - Pokemon TCG
        - Both
    validations:
      required: false
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered steps. Include minimal input if possible.
      placeholder: |
        1. Open the Scan tab
        2. Choose image X
        3. Click "Identify"
        4. See error Y
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or error text
      description: |
        Paste any error messages shown in the app or the console. Redact anything
        personal. Logs render best in a code block.
      render: text
    validations:
      required: false
  - type: checkboxes
    id: confirm
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I am not including any credentials, tokens, or personal data in this report.
          required: true
