name: Feature request
description: Suggest an enhancement or new capability
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Keep in mind Binderbase is a local-first desktop
        app. Proposals that require us to run cloud services are unlikely to land.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user-facing friction, not the solution yet.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the app do? UI, CLI, behavior — whatever applies.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: dropdown
    id: scope
    attributes:
      label: Scope this applies to
      multiple: true
      options:
        - Scanning
        - Collection management
        - Pricing
        - Import / Export
        - Performance
        - Accessibility
        - Packaging / distribution
        - Mobile (future)
        - Other
    validations:
      required: true
  - type: checkboxes
    id: confirm
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: This proposal does not rely on cloud hosting or cloud compute.
          required: true
