# Branch protection policy for Binderbase.
# Applied as a GitHub ruleset on 'main' by repo admin.
#
# This file documents the intended ruleset configuration. GitHub does
# not consume it directly — Matt applies it via the repository
# Settings UI.

rules_for: main
require_pull_request:
  required_approvals: 1
  # NOTE: GitHub Copilot code review provides the required approval,
  # allowing the solo maintainer to merge with enforce_admins on.
  # Raising to 2 is not needed while Copilot satisfies the 1-review
  # requirement. Documented in .github/SECURITY.md.
  dismiss_stale_reviews: true
  require_code_owner_review: true
  require_last_push_approval: true
require_status_checks:
  strict: true # branch must be up to date
  checks:
    - CI / Frontend (lint, typecheck, build)
    - CI / Rust lint (fmt, clippy)
    - CI / Rust test (ubuntu-latest)
    - CI / Security audit
    - CodeQL / Analyze (javascript-typescript)
    - CodeQL / Analyze (actions)
    - cargo-deny / cargo-deny
    - OSV-Scanner / OSV vulnerability scan
require_signed_commits: false # opt-in when contributors are comfortable with gpg/ssh signing
require_linear_history: true
block_force_pushes: true
restrict_deletions: true
enforce_admins: true # Copilot code review provides the required approval
