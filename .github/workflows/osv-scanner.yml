# OSV-Scanner — vulnerability scanning for Rust and JS dependencies.
# Uses Google's osv-scanner reusable workflows to upload SARIF to
# GitHub Code Scanning.
#
# Docs: https://google.github.io/osv-scanner/github-action/
name: OSV-Scanner

on:
  schedule:
    - cron: "15 8 * * 1" # Mondays 08:15 UTC
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

permissions: {}

jobs:
  # Full scheduled / push scan — reports all known vulnerabilities.
  scan-scheduled:
    if: github.event_name == 'push' || github.event_name == 'schedule'
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@c51854704019a247608d928f370c98740469d4b5" # v2.3.5
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      scan-args: |-
        --config=./osv-scanner.toml
        --recursive
        ./

  # PR / merge-group scan — only surfaces newly introduced vulnerabilities.
  scan-pr:
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@c51854704019a247608d928f370c98740469d4b5" # v2.3.5
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      scan-args: |-
        --config=./osv-scanner.toml
        --recursive
        ./
