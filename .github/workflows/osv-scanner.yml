# OSV-Scanner — vulnerability scanning for Rust and JS dependencies.
# Downloads the osv-scanner CLI directly and uploads SARIF to GitHub
# Code Scanning via codeql-action/upload-sarif.
#
# Docs: https://google.github.io/osv-scanner/
name: OSV-Scanner

on:
  schedule:
    - cron: "15 8 * * 1" # Mondays 08:15 UTC
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

permissions: {}

jobs:
  osv-scan:
    name: OSV vulnerability scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install osv-scanner v2.3.5
        env:
          OSV_VERSION: "2.3.5"
          OSV_SHA256: "bb30c580afe5e757d3e959f4afd08a4795ea505ef84c46962b9a738aa573b41b"
        run: |
          curl -fsSL "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64" \
            -o /usr/local/bin/osv-scanner
          echo "${OSV_SHA256}  /usr/local/bin/osv-scanner" | sha256sum -c -
          chmod +x /usr/local/bin/osv-scanner

      - name: Run osv-scanner (SARIF)
        id: scan
        continue-on-error: true
        run: |
          osv-scanner scan --config=./osv-scanner.toml \
            --recursive --format sarif --output results.sarif ./

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: results.sarif

      - name: Enforce scan result
        if: steps.scan.outcome == 'failure'
        run: |
          echo "::error::osv-scanner found vulnerabilities not covered by osv-scanner.toml ignores"
          exit 1
