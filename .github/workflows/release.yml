# SPDX-License-Identifier: AGPL-3.0-or-later
name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: binderbase-linux
          - os: macos-latest
            artifact: binderbase-macos
          - os: windows-latest
            artifact: binderbase-windows
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Linux WebKit / Tauri deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Cache Rust toolchain and dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: "src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Binderbase ${{ github.ref_name }}"
          releaseBody: |
            See [CHANGELOG.md](https://github.com/aecyx/Binderbase/blob/main/CHANGELOG.md) for details.

            > **Note:** These binaries are not code-signed. Your OS may warn you on first launch.
            > Verify downloads using the SHA256 checksums below.
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, 'rc') }}

  checksums:
    name: Generate checksums
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release assets
        uses: robinraju/release-downloader@a96f54c1b5f5e09e47d9504526e96febd949d4c2 # v1.11
        with:
          tag: ${{ github.ref_name }}
          fileName: "*"
          out-file-path: assets
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SHA256 checksums
        run: |
          cd assets
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload checksums
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ github.ref_name }}
          files: assets/SHA256SUMS.txt
          draft: true

  sign:
    name: Sign release artifacts
    needs: checksums
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Download release assets
        uses: robinraju/release-downloader@a96f54c1b5f5e09e47d9504526e96febd949d4c2 # v1.11
        with:
          tag: ${{ github.ref_name }}
          fileName: "*"
          out-file-path: assets
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign each artifact
        run: |
          cd assets
          for artifact in *; do
            echo "Signing $artifact ..."
            cosign sign-blob --yes --bundle "${artifact}.bundle" "$artifact"
          done

      - name: Upload signatures
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ github.ref_name }}
          files: assets/*.bundle
          draft: true
