# OpenSSF Scorecard — weekly automated audit of this repo's security
# posture against industry best practices. Produces a score on
# https://scorecard.dev and uploads SARIF findings to the Security tab.
#
# Docs: https://github.com/ossf/scorecard-action
#
# Required repo setup (one-time, done via GitHub UI):
#   Settings → Actions → General → Allow specified actions, add:
#     ossf/scorecard-action@*
#     github/codeql-action/upload-sarif@*
#     actions/upload-artifact@*
#   Settings → Code security → Code scanning → enable.
name: Scorecard supply-chain security

on:
  # Weekly run — SLAs and drift reporting are the point.
  schedule:
    - cron: "32 7 * * 1" # Mondays 07:32 UTC
  # Also run on pushes to main so regressions show up immediately in PRs
  # that change CI/deps.
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload SARIF results to the code-scanning dashboard.
      security-events: write
      # Needed for OIDC-signed provenance (used to publish badge scores).
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # publish_results:true opts the repo into the public Scorecard
          # dashboard at https://scorecard.dev. Safe for a public repo; flip
          # to false if we ever relist as private.
          publish_results: true

      - name: Upload SARIF artifact (audit trail)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 7

      - name: Upload SARIF to code-scanning dashboard
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: results.sarif
