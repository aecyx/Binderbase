# SPDX-License-Identifier: AGPL-3.0-or-later
# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
ignore = [
  # All transitive unmaintained deps — no fix available, pinned by Tauri 2's
  # GTK stack on Linux + urlpattern dependency chain. Full triage in Phase 2.
  # Review by: 2026-10-19

  # GTK/GDK stack (tauri → tao → gtk)
  "RUSTSEC-2024-0411", # gdkwayland-sys — unmaintained
  "RUSTSEC-2024-0412", # gdk — unmaintained
  "RUSTSEC-2024-0413", # atk — unmaintained
  "RUSTSEC-2024-0414", # gdkx11-sys — unmaintained
  "RUSTSEC-2024-0415", # gtk — unmaintained
  "RUSTSEC-2024-0416", # atk-sys — unmaintained
  "RUSTSEC-2024-0417", # gdkx11 — unmaintained
  "RUSTSEC-2024-0418", # gdk-sys — unmaintained
  "RUSTSEC-2024-0419", # gtk3-macros — unmaintained
  "RUSTSEC-2024-0420", # gtk-sys — unmaintained

  # proc-macro-error (tauri → various proc-macro crates)
  "RUSTSEC-2024-0370", # proc-macro-error — unmaintained, no successor

  # fxhash (transitive)
  "RUSTSEC-2025-0057", # fxhash — unmaintained

  # unic-* (tauri → tauri-utils → urlpattern → unic-*)
  "RUSTSEC-2025-0075", # unic-char-range — unmaintained
  "RUSTSEC-2025-0080", # unic-common — unmaintained
  "RUSTSEC-2025-0081", # unic-char-property — unmaintained
  "RUSTSEC-2025-0098", # unic-ucd-version — unmaintained
  "RUSTSEC-2025-0100", # unic-ucd-ident — unmaintained
]

[licenses]
version = 2
allow = [
  "AGPL-3.0-or-later",     # our own license
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "CC0-1.0",
  "Zlib",
  "MPL-2.0",               # copyleft-weak, compatible with AGPL consumer
  "CDLA-Permissive-2.0",   # webpki-roots (Mozilla root CA data)
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
