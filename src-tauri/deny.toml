# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
ignore = [
  # ── GTK3 stack (tauri → tao → gtk) ──────────────────────────────────────
  # All unmaintained gtk-rs 0.18 crates. Blocked on Tauri's GTK4 migration,
  # targeted at Tauri 3.0:
  #   - tauri-apps/tauri#14684 (feat: migrate to GTK4 and WebKitGTK 6.0, PR open, milestone 3.0)
  #   - tauri-apps/tauri#12563 (Upgrade tauri to gtk4-rs, open, assigned to lucasfernog)
  # Last upstream activity: 2026-04 (PR #14684 active).
  "RUSTSEC-2024-0411", # gdkwayland-sys — unmaintained
  "RUSTSEC-2024-0412", # gdk — unmaintained
  "RUSTSEC-2024-0413", # atk — unmaintained
  "RUSTSEC-2024-0414", # gdkx11-sys — unmaintained
  "RUSTSEC-2024-0415", # gtk — unmaintained
  "RUSTSEC-2024-0416", # atk-sys — unmaintained
  "RUSTSEC-2024-0417", # gdkx11 — unmaintained
  "RUSTSEC-2024-0418", # gdk-sys — unmaintained
  "RUSTSEC-2024-0419", # gtk3-macros — unmaintained
  "RUSTSEC-2024-0420", # gtk-sys — unmaintained

  # glib 0.18.5 unsound Iterator/DoubleEndedIterator impls — same GTK3 stack,
  # will resolve with the GTK4 migration above (gtk4-rs uses glib 0.20+).
  "RUSTSEC-2024-0429", # glib — unsound

  # proc-macro-error 1.0.4 — unmaintained; used by glib-macros and gtk3-macros.
  # Blocked on GTK4 migration (same as above). proc-macro-error2 fork exists
  # but can't patch without also patching glib-macros (upstream-controlled).
  "RUSTSEC-2024-0370", # proc-macro-error — unmaintained

  # ── tauri-utils → kuchikiki → selectors chain ──────────────────────────
  # fxhash 0.2.1 — unmaintained; pulled via selectors → kuchikiki → tauri-utils.
  # Blocked on tauri-utils replacing kuchikiki (Brave fork) in the HTML parser.
  "RUSTSEC-2025-0057", # fxhash — unmaintained

  # rand 0.7.3 — unsound; pulled via phf_codegen → phf_generator → rand 0.7
  # (build-dep of selectors). Same kuchikiki chain as fxhash above.
  "RUSTSEC-2026-0097", # rand 0.7 — unsound

  # ── tauri-utils → urlpattern 0.3.0 → unic-* ───────────────────────────
  # All unmaintained. urlpattern 0.6.0 exists (denoland/rust-urlpattern) and
  # likely drops unic, but tauri-utils 2.x pins urlpattern 0.3.0.
  # Blocked on tauri-utils upgrading urlpattern.
  "RUSTSEC-2025-0075", # unic-char-range — unmaintained
  "RUSTSEC-2025-0080", # unic-common — unmaintained
  "RUSTSEC-2025-0081", # unic-char-property — unmaintained
  "RUSTSEC-2025-0098", # unic-ucd-version — unmaintained
  "RUSTSEC-2025-0100", # unic-ucd-ident — unmaintained
]

[licenses]
version = 2
allow = [
  "AGPL-3.0-or-later",     # our own license
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "CC0-1.0",
  "Zlib",
  "MPL-2.0",               # copyleft-weak, compatible with AGPL consumer
  "CDLA-Permissive-2.0",   # webpki-roots (Mozilla root CA data)
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
